apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-github-creds
  namespace: argocd
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: kubernetes-store
    kind: ClusterSecretStore
  target:
    name: argocd-repo-creds
    template:
      data:
        type: git
        url: https://github.com/gcpuser1
        username: gcpuser1
        password: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: github-token
        property: token
